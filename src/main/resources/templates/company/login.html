<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Login da Empresa</title>
</head>

<body class="bg-gray-900 h-screen items-center flex justify-center">
    <form action="" class="flex gap-24" th:action="@{/company/signIn}" method="post">
        <div class="text-white max-width text-6xl flex items-center">
            Gestao de vagas
        </div>
        <div class="space-y-8 bg-zinc-950 rounded-md p-20">
            <input type="text" name="username"
                class="bg-gray-50 text-gray-900 text-xd rounded w-96 block p-3 focus:ring-green-600 focus:outline-none focus:ring-2 focus:outline-none"
                placeholder="Usuário">
            <input type="password" name="password"
                class="bg-gray-50 text-gray-900 text-xd rounded w-96 block p-3 focus:ring-green-600 focus:outline-none focus:ring-2 focus:outline-none"
                placeholder="Senha">

            <p class="text-red-400" th:if="${error_message}" th:text="${error_message}"></p>

            <button type="submit"
                class="bg-green-900 w-96 p-4 text-white text-md font-bold cursor-pointer rounded hover:bg-green-700">Entrar</button>
            <a href="/company/create"
                class="text-white text-md font-bold block text-center rounded hover:text-green-600 underline underline-offset-2">
                Crie sua conta
            </a>
        </div>
    </form>
</body>

</html>
