<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Cadastro da empresa</title>
</head>

<body class="bg-gray-900 h-screen items-center flex justify-center">
    <form id="submitForm" class="flex gap-24" th:action="@{/company/create}" method="post" th:object="${company}">


        <div class="space-y-8 bg-zinc-950 rounded-md p-10">

            <p class="text-white font-bold text-center text-4xl mb-3">Crie seu Cadastro</p>

            <div class="flex flex-row gap-3">
                <input type="text" name="username" id="username" th:field="*{username}"
                    class="bg-gray-50 text-gray-900 text-xd rounded w-96 block p-3 focus:ring-green-600 focus:outline-none focus:ring-2 focus:outline-none"
                    placeholder="Digite o seu Usuário">

                <input type="email" name="email" th:field="*{email}"
                    class="bg-gray-50 text-gray-900 text-xd rounded w-96 block p-3 focus:ring-green-600 focus:outline-none focus:ring-2 focus:outline-none"
                    placeholder="Digite o seu E-mail">
            </div>

            <div class="flex flex-row gap-3">
                <input type="text" name="website" th:field="*{website}"
                    class="bg-gray-50 text-gray-900 text-xd rounded w-96 block p-3 focus:ring-green-600 focus:outline-none focus:ring-2 focus:outline-none"
                    placeholder="Digite o seu website">
                <input type="text" name="name" th:field="*{name}"
                    class="bg-gray-50 text-gray-900 text-xd rounded w-96 block p-3 focus:ring-green-600 focus:outline-none focus:ring-2 focus:outline-none"
                    placeholder="Digite o nome da sua Empresa">
            </div>

            <div class="flex flex-row gap-3">
                <input type="password" name="password" id="password" th:field="*{password}"
                    class="bg-gray-50 text-gray-900 text-xd rounded w-96 block p-3 focus:ring-green-600 focus:outline-none focus:ring-2 focus:outline-none"
                    placeholder="Digite a sua Senha">

                <input type="password" name="confirmPassword" id="passwordConfirmation"
                    class="bg-gray-50 text-gray-900 text-xd rounded w-96 block p-3 focus:ring-green-600 focus:outline-none focus:ring-2 focus:outline-none"
                    placeholder="Confirme a sua Senha">
            </div>

            <div class="w-full">
                <textarea name="description" th:field="*{description}"
                    class="bg-gray-50 text-gray-900 text-xd rounded w-full block p-3 focus:ring-green-600 focus:outline-none focus:ring-2 focus:outline-none"
                    placeholder="Digite uma breve descrição sobre a sua Empresa"></textarea>
            </div>

            <p class="text-red-400 hidden" id="messagePasswordMismatch"> As senhas não conferem!</p>
            <p class="text-red-400" th:if="${error_message}" th:text="${error_message}"></p>

            <button type="submit"
                class="bg-green-900 w-full p-4 text-white text-md font-bold cursor-pointer rounded hover:bg-green-700 ">Cadastre-se</button>
            <p class="text-white mt-4">Já tem uma conta? <a href="/company/login"
                    class="text-center text-green-700 hover:text-green-600">
                    Faça Login
                </a></p>

        </div>
        <div class="text-white max-width text-6xl flex items-center">
            Gestao de vagas
        </div>
    </form>

    <script>
        document.getElementById('submitForm').addEventListener('submit', function (event) {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('passwordConfirmation').value;
            if (password !== confirmPassword) {
                document.getElementById('messagePasswordMismatch').classList.remove('hidden');
                return;
            }
        });
    </script>

</body>

</html>
